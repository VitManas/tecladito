<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reset.css">
    <title>Tecladito</title>
</head>
<body>
    <ul id="keyboard">
        <li class="white tecla a 65">A</li>
        <li class="black tecla w 87">W</li>
        <li class="white tecla s 83 offset">S</li>
        <li class="black tecla e 69">E</li>
        <li class="white tecla d 68 offset">D</li>
        <li class="white tecla f 70 ">F</li>
        <li class="black tecla t 84 ">T</li>
        <li class="white tecla g 71 offset">G</li>
        <li class="black tecla y 89 ">Y</li>
        <li class="white tecla h 72 offset">H</li>
        <li class="black tecla u 85 ">U</li>
        <li class="white tecla j 74 offset">J</li>
    </ul>
        
        <audio src="sounds/keyc.wav" id="som_a"></audio>
        <audio src="sounds/keycsus.wav" id="som_w"></audio>
        <audio src="sounds/keyd.wav" id="som_s"></audio>
        <audio src="sounds/keydsus.wav" id="som_e"></audio>
        <audio src="sounds/keye.wav" id="som_d"></audio>
        <audio src="sounds/keyf.wav" id="som_f"></audio>
        <audio src="sounds/keyfsus.wav" id="som_t"></audio>
        <audio src="sounds/keyg.wav" id="som_g"></audio>
        <audio src="sounds/keygsus.wav" id="som_y"></audio>
        <audio src="sounds/keya.wav" id="som_h"></audio>
        <audio src="sounds/keyasus.wav" id="som_u"></audio>
        <audio src="sounds/keyb.wav" id="som_j"></audio>
        
    <script type='text/javascript' src='main.js'></script>
</body>
</html>
